<section class="compliance-section container-fluid">
  <div class="row g-4">

    <!-- LEFT SIDE: MAP + TABLE -->
    <div class="col-lg-8">
      <div #mapViewNode class="map-box mb-4"></div>

      <div class="table-responsive">
        <table class="table table-success table-striped table-hover">
          <thead>
            <tr>
              <th>Facility Name</th>
              <th>Location</th>
              <th>Last Inspection</th>
              <th>Compliance Rate</th>
              <th>Grade</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let f of facilities">
              <td>{{ f.name }}</td>
              <td>{{ f.location }}</td>
              <td>{{ f.lastInspection }}</td>
              <td>{{ f.complianceRate }}%</td>
              <td>{{ f.grade }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- RIGHT SIDE: CHART WIDGETS -->
    <div class="col-lg-4 d-flex flex-column gap-4">

      <div class="chart-box" style="height: 250px;">
        <canvas #pieChart></canvas>
        <h6 class="mt-2 text-center">Grade Distribution</h6>
      </div>

      <div class="chart-box" style="height: 250px;">
        <canvas #barChart></canvas>
        <h6 class="mt-2 text-center">Compliance Rate per Facility</h6>
      </div>

      <div class="chart-box" style="height: 250px;">
        <canvas #lineChart></canvas>
        <h6 class="mt-2 text-center">Monthly Inspections by Sector</h6>
      </div>

    </div>
  </div>
</section>
