<div class="login-container d-flex justify-content-center">
  <div class="login-card p-5 rounded-4 shadow-lg">

    <h2 class="mb-4 text-center">Register</h2>

    <form (ngSubmit)="register()">

      <!-- Full Name -->
      <div class="mb-3">
        <input type="text"
               [(ngModel)]="fullName"
               name="fullName"
               class="form-control form-control-lg"
               placeholder="Full Name"
               required>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <input type="email"
               [(ngModel)]="email"
               name="email"
               class="form-control form-control-lg"
               placeholder="Email Address"
               required>
      </div>

      <!-- Phone -->
      <div class="mb-3">
        <input type="tel"
               [(ngModel)]="phone"
               name="phone"
               class="form-control form-control-lg"
               placeholder="Phone Number"
               required>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <input type="password"
               [(ngModel)]="password"
               name="password"
               class="form-control form-control-lg"
               placeholder="Password"
               required>
      </div>

      <!-- Confirm Password -->
      <div class="mb-4">
        <input type="password"
               [(ngModel)]="confirmPassword"
               name="confirmPassword"
               class="form-control form-control-lg"
               placeholder="Confirm Password"
               required>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-success btn-lg w-100">
        Create Account
      </button>

      <!-- Link to login -->
      <div class="text-center mt-3">
        <small style="color:white;">
          Already have an account?
          <a routerLink="/login" style="color:#fff; font-weight:600;">
            Login
          </a>
        </small>
      </div>

    </form>

  </div>
</div>
